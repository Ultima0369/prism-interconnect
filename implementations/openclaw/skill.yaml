# 🧠 棱镜互联协议 - OpenClaw Skill
# 认知工程学与哲学底蕴的深度集成

name: prism-interconnect
version: 1.0.0
description: |
  基于三层认知现实框架的深度对话协议，帮助理解人类心智认知世界时的动态细节，
  突破对现象的误判与执迷，回归物理规律的尊重，实际效用的检验，
  生命质感与人生质量的追求。

  > 一题，多面，映照心智的色谱。
  > 这里没有说教。无非是作者比多数学者干过更多蠢事，对自心有过一番勇猛的直视。

author: 星尘 & 璇玑
license: CC BY-NC 4.0
homepage: https://github.com/Ultima0369/prism-interconnect
repository: https://github.com/Ultima0369/prism-interconnect.git

# 🎯 核心哲学定位
philosophical_foundation:
  - name: 三层认知现实框架
    description: |
      1. 工具现实：人类为了生存的简化建构
      2. 自然现实：沉默的宇宙秩序  
      3. 体验现实：注意力建构的存在
    reference: docs/PHILOSOPHY_VOLUME.md#设计哲学工具现实与注意力建构的世界

  - name: 认知工程学原则
    description: |
      1. 理解心智触碰世界的动态细节
      2. 揭示误会产生的原因
      3. 突破对现象的误判与执迷
      4. 回归物理规律的尊重
      5. 实际效用的检验
      6. 生命质感与人生质量的追求
    reference: 基于星尘的原始动机声明

  - name: 道家智慧整合
    description: |
      天地有大美而不言，四时有明法而不议，万物有成理而不说。
      注意力的散乱，人生除了酸楚，还有众多真善美与妙。
    reference: docs/PHILOSOPHY_VOLUME.md#设计哲学工具现实与注意力建构的世界

# 🔬 科学基础
scientific_basis:
  - field: 认知神经科学
    concepts:
      - 预测处理理论 (Predictive Processing)
      - 时间切片与认知节律
      - 默认模式网络与认知整合
    references:
      - docs/SCIENTIFIC_TERMINOLOGY_MAPPING.md#认知碎片论--预测处理理论-predictive-processing
      - docs/NEUROCOGNITIVE_FOUNDATIONS.md

  - field: 认知心理学
    concepts:
      - 双过程理论 (系统1/系统2/系统3)
      - 认知模式与神经签名
      - 元认知与自我调节
    references:
      - docs/SCIENTIFIC_TERMINOLOGY_MAPPING.md#光谱类型--认知模式与神经签名
      - docs/AI_COGNITIVE_MODELING.md

  - field: 复杂系统科学
    concepts:
      - 认知碎片的动态重组
      - 意义涌现的自组织过程
      - 多层次认知的协调
    references:
      - docs/COGNITIVE_SLICING_THEORY.md
      - docs/MEANING_LAYER_INTERNET.md

# 🛠️ 技术实现
technical_implementation:
  protocol_version: v0.1
  architecture: 意义层互联网 (Meaning Layer Internet)
  
  core_components:
    - name: 棱镜消息协议
      description: 结构化认知状态交换协议
      file: protocol-v0.1.json
      features:
        - 强制光谱多样性 (至少3种)
        - 内置留白和反思空间
        - 递归深度安全限制
        - 伦理符合性实时检查

    - name: 光谱生成引擎
      description: 并行生成多元认知视角
      file: implementations/python/prism_agent.py
      spectrum_types:
        - red: 直觉光谱 (快速、整体、模式识别)
        - blue: 分析光谱 (慢速、细节、逻辑推理)
        - purple: 元认知光谱 (监控、调节、反思)
        - green: 情感光谱 (价值、意义、连接) [可选]
        - orange: 创造性光谱 (联想、新颖、突破) [可选]

    - name: 留白管理系统
      description: 认知整合和意义生成的沉默空间
      file: implementations/python/whitespace_manager.py
      types:
        - integration_whitespace: 认知整合 (30-60秒)
        - reflection_whitespace: 深度反思 (60-180秒)
        - creative_whitespace: 创造性洞察 (可变时长)

    - name: 伦理检查器
      description: 实时伦理审查和非评判性保证
      file: implementations/python/ethical_checker.py
      principles:
        - 非评判性原则: 禁止比较视角优劣
        - 自主性原则: 尊重认知自主和选择自由
        - 安全原则: 防止认知过载和伤害
        - 透明度原则: 明确展示认知过程和局限

