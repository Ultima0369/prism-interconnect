# 🎮 OpenClaw集成
openclaw_integration:
  skill_type: cognitive_engineering
  category: [philosophy, neuroscience, ai, communication]
  
  triggers:
    - pattern: "@棱镜"
      description: 直接调用棱镜对话
      example: "@棱镜 为什么我总在亲密关系中重复同样的矛盾？"

    - pattern: "棱镜分析"
      description: 请求棱镜式多元分析
      example: "棱镜分析一下当前AI发展的伦理困境"

    - pattern: "多视角"
      description: 请求多个认知视角
      example: "多视角看待气候变化问题"

    - pattern: "留白反思"
      description: 启动留白反思过程
      example: "留白反思我刚才的决策过程"

  capabilities:
    - name: prismatic_dialogue
      description: 棱镜式深度对话
      parameters:
        - name: query
          type: string
          required: true
          description: 要分析的问题或情境
        - name: spectrum_count
          type: integer
          default: 3
          min: 3
          max: 5
          description: 要生成的光谱数量
        - name: whitespace_type
          type: string
          enum: [integration, reflection, creative]
          default: integration
          description: 留白类型

    - name: cognitive_analysis
      description: 认知过程分析
      parameters:
        - name: text
          type: string
          required: true
          description: 要分析的文本或对话
        - name: analysis_depth
          type: string
          enum: [surface, medium, deep]
          default: medium
          description: 分析深度

    - name: perspective_expansion
      description: 视角扩展训练
      parameters:
        - name: topic
          type: string
          required: true
          description: 训练主题
        - name: difficulty
          type: string
          enum: [beginner, intermediate, advanced]
          default: intermediate
          description: 训练难度

    - name: whitespace_guidance
      description: 留白引导和计时
      parameters:
        - name: purpose
          type: string
          required: true
          description: 留白目的
        - name: duration_seconds
          type: integer
          default: 60
          min: 30
          max: 300
          description: 留白时长（秒）

  installation:
    simple: |
      # 从GitHub直接安装
      openclaw skill install https://github.com/Ultima0369/prism-interconnect/implementations/openclaw/skill.yaml

    development: |
      # 克隆仓库后本地安装
      git clone https://github.com/Ultima0369/prism-interconnect.git
      cd prism-interconnect
      openclaw skill install implementations/openclaw/skill.yaml

