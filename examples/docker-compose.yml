# 🐳 棱镜协议 Streamlit 应用 Docker Compose 配置
# 一键部署完整开发/生产环境

version: '3.8'

services:
  # 开发环境
  prism-dev:
    build:
      context: ..
      dockerfile: examples/Dockerfile
      target: development
    container_name: prism-streamlit-dev
    ports:
      - "8501:8501"
    volumes:
      - ./streamlit_app.py:/app/streamlit_app.py
      - ./README.md:/app/README.md
    environment:
      - PRISM_ENV=development
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
    networks:
      - prism-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import streamlit; print('✅ 开发环境健康')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 生产环境
  prism-prod:
    build:
      context: ..
      dockerfile: examples/Dockerfile
      target: production
    container_name: prism-streamlit-prod
    ports:
      - "8502:8501"
    environment:
      - PRISM_ENV=production
      - STREAMLIT_SERVER_PORT=8501
      - STREAMLIT_SERVER_ADDRESS=0.0.0.0
      - STREAMLIT_SERVER_MAX_UPLOAD_SIZE=10
      - STREAMLIT_SERVER_MAX_MESSAGE_SIZE=10
      - STREAMLIT_SERVER_ENABLE_CORS=false
      - STREAMLIT_SERVER_ENABLE_XSRF_PROTECTION=true
    networks:
      - prism-network
    restart: always
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        delay: 10s
      restart_policy:
        condition: on-failure
        delay: 5s
        max_attempts: 3
        window: 120s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8501/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # Nginx 反向代理（生产环境）
  nginx:
    image: nginx:alpine
    container_name: prism-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - prism-prod
    networks:
      - prism-network
    restart: always

  # 监控服务（可选）
  prometheus:
    image: prom/prometheus:latest
    container_name: prism-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=200h'
      - '--web.enable-lifecycle'
    networks:
      - prism-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: prism-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    networks:
      - prism-network
    restart: unless-stopped

# 网络配置
networks:
  prism-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

# 卷配置
volumes:
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

# ==================== 使用说明 ====================

# 启动开发环境:
# docker-compose -f examples/docker-compose.yml up prism-dev

# 启动生产环境:
# docker-compose -f examples/docker-compose.yml up prism-prod nginx

# 启动完整监控栈:
# docker-compose -f examples/docker-compose.yml up

# 查看日志:
# docker-compose -f examples/docker-compose.yml logs -f

# 停止服务:
# docker-compose -f examples/docker-compose.yml down

# 停止并删除数据:
# docker-compose -f examples/docker-compose.yml down -v

# 重新构建镜像:
# docker-compose -f examples/docker-compose.yml build

# 扩展副本数:
# docker-compose -f examples/docker-compose.yml up --scale prism-prod=3